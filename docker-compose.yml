services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: debtclear
      POSTGRES_PASSWORD: debtclear
      POSTGRES_DB: debtclear
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U debtclear -d debtclear"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://debtclear:debtclear@db:5432/debtclear
      PORT: 3001
      NODE_ENV: production
    ports:
      - "13000:3000"
      - "13001:3001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
