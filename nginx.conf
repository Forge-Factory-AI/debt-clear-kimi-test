server {
    listen 3000;
    server_name _;
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ForgeSmith chat UI — redirect /smith to /smith/ (preserve query params)
    location = /smith {
        absolute_redirect off;
        return 301 /smith/$is_args$args;
    }

    # ForgeSmith chat UI (static files)
    location /smith/ {
        alias /opt/forgesmith/web/;
        index index.html;
        try_files $uri $uri/ /smith/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ForgeSmith API (proxy to Hermes HTTP gateway)
    location /api/smith/ {
        proxy_pass http://127.0.0.1:8585/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
